<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="expires" content="0">
    <title>Мессенджер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Auth Modal -->
    <div class="auth-modal" id="authModal">
        <div class="auth-container">
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Вход</button>
                <button class="auth-tab" data-tab="register">Регистрация</button>
            </div>
            
            <!-- Login Form -->
            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="Введите email" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" placeholder="Введите пароль" required>
                </div>
                <div class="error-message" id="loginError"></div>
                <button type="submit" class="auth-submit">Войти</button>
            </form>
            
            <!-- Register Form -->
            <form class="auth-form hidden" id="registerForm">
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" id="regUsername" placeholder="Придумайте имя" required minlength="3">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="Введите email" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="regPassword" placeholder="Минимум 6 символов" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Подтвердите пароль</label>
                    <input type="password" id="regConfirmPassword" placeholder="Повторите пароль" required>
                </div>
                <div class="error-message" id="registerError"></div>
                <button type="submit" class="auth-submit">Зарегистрироваться</button>
            </form>
            
            <div class="user-info hidden" id="userInfo">
                <p>Вы вошли как: <strong id="displayUsername"></strong></p>
                <p class="unique-code">Ваш уникальный код: <strong id="displayCode"></strong></p>
                <button class="logout-btn" id="logoutBtn">Выйти</button>
            </div>
        </div>
    </div>

    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Чаты</h2>
                <input type="text" class="search-box" placeholder="Поиск..." />
                <button class="new-chat-btn" id="newChatBtn">+</button>
            </div>
            
            <div class="chat-list" id="chatList">
                <!-- Chat items will be added here -->
            </div>

            <div class="invite-panel">
                <button class="invite-btn" id="getChatCodeBtn" disabled>Получить код</button>
                <div class="invite-code-preview" id="inviteCodePreview"></div>
                <div class="join-chat-row">
                    <input type="text" id="joinCodeInput" placeholder="Введите 6-значный код">
                    <button class="join-chat-btn" id="joinChatBtn">Присоединиться</button>
                </div>
            </div>
            
            <div class="settings">
                <button class="logout-sidebar-btn" id="logoutSidebarBtn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
    </svg>
    <span>Выйти</span>
</button>
                <button class="settings-btn" id="settingsBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                    <span>Настройки</span>
                </button>
            </div>
        </aside>

        <!-- Chat Area -->
        <main class="chat-area">
            <div class="chat-header" id="chatHeader">
                <div class="chat-header-info">
                    <button class="back-btn" id="backBtn" style="display:none;">←</button>
                    <div class="avatar" id="currentAvatar">Б</div>
                    <div class="chat-header-text">
                        <h3 id="currentChatName">Выберите чат</h3>
                        <span class="chat-status" id="currentChatStatus">онлайн</span>
                    </div>
                </div>
                <div class="chat-search-row">
                    <input type="text" id="chatSearchBox" class="chat-search-box" placeholder="Поиск сообщений в чате..." />
                    <button id="chatSearchBtn" class="chat-search-btn">🔍</button>
                    <span id="searchCounter" class="search-counter" style="display:none;"></span>
                    <button id="searchPrev" class="search-nav-btn" style="display:none;" title="Предыдущее">▲</button>
                    <button id="searchNext" class="search-nav-btn" style="display:none;" title="Следующее">▼</button>
                    <button id="chatSearchClear" class="chat-search-clear" style="display:none;">✕</button>
                </div>
            </div>

            <div class="messages" id="messages">
                <div class="no-chat-selected">
                    <p>Выберите чат из списка</p>
                </div>
            </div>

            <div class="input-area" id="inputArea">
                <div class="reply-preview hidden" id="replyPreview">
                    <span id="replyPreviewText"></span>
                    <button type="button" class="cancel-reply-btn" id="cancelReplyBtn">✕</button>
                </div>
                <button type="button" class="emoji-btn" id="emojiButton">😊</button>
                <button type="button" class="file-btn" id="fileButton">📎</button>
                <button type="button" class="voice-btn" id="voiceButton">🎤</button>
                <input type="text" id="messageInput" placeholder="Введите сообщение..." disabled>
                <button id="sendBtn" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
                <input type="file" id="fileInput" hidden>
                <span class="record-indicator hidden" id="recordIndicator">Запись...</span>
                <div class="emoji-picker hidden" id="emojiPicker">
                    <button type="button" class="emoji-item">😊</button>
                    <button type="button" class="emoji-item">😂</button>
                    <button type="button" class="emoji-item">😍</button>
                    <button type="button" class="emoji-item">😎</button>
                    <button type="button" class="emoji-item">😢</button>
                    <button type="button" class="emoji-item">😡</button>
                    <button type="button" class="emoji-item">👍</button>
                    <button type="button" class="emoji-item">🎉</button>
                    <button type="button" class="emoji-item">💬</button>
                    <button type="button" class="emoji-item">🔥</button>
                </div>
                
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Настройки</h3>
                <button class="close-btn" id="closeSettings">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-item">
                    <label>Имя пользователя</label>
                    <input type="text" id="usernameInput" value="Пользователь">
                </div>
                <div class="setting-item">
                    <label>Аватар</label>
                    <div class="avatar-upload">
                        <div class="avatar-color-row">
                            <input type="color" id="avatarColorInput" value="#667eea">
                            <span id="avatarColorValue" class="avatar-color-value">#667EEA</span>
                        </div>
                        <div class="avatar-color-preview" id="avatarColorPreview">П</div>
                    </div>
                </div>
                <div class="setting-item">
                    <label>Тема</label>
                    <select id="themeSelect">
                        <option value="light">Светлая</option>
                        <option value="dark">Тёмная</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>Уведомления</label>
                    <label class="toggle">
                        <input type="checkbox" id="notificationsToggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div class="modal-actions">
                <button type="button" class="settings-btn-secondary" id="profileBtn" onclick="showUserProfile()">Профиль</button>
                <button type="button" class="settings-btn-secondary" id="changePasswordBtn" onclick="changePassword()">Сменить пароль</button>
                <button type="button" class="settings-save-btn" id="settingsSaveBtn">Сохранить</button>
            </div>
        </div>
    </div>
    <!-- Change Password Modal -->
<div class="modal" id="changePasswordModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Смена пароля</h3>
            <button class="close-btn" id="closeChangePassword">&times;</button>
        </div>
        <div class="modal-body">
            <div class="setting-item">
                <label>Текущий пароль</label>
                <input type="password" id="cpCurrent" placeholder="Введите текущий пароль">
            </div>
            <div class="setting-item">
                <label>Новый пароль</label>
                <input type="password" id="cpNew" placeholder="Минимум 6 символов">
            </div>
            <div class="setting-item">
                <label>Повторите новый пароль</label>
                <input type="password" id="cpConfirm" placeholder="Повторите пароль">
            </div>
            <div class="error-message" id="cpError"></div>
        </div>
        <div class="modal-actions">
            <button type="button" class="settings-save-btn" id="cpSaveBtn">Сохранить</button>
        </div>
    </div>
</div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
    
    <!-- Copyright Watermark -->
    <div class="copyright-watermark">Copyright © 2026 Online Messenger</div>
</body>
</html>
